yukon_health:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('SUPABASE_HOST') }}"
      port: "{{ env_var('SUPABASE_PORT') | int }}"
      user: "{{ env_var('SUPABASE_USER') }}"
      pass: "{{ env_var('SUPABASE_PASSWORD') }}"
      dbname: "{{ env_var('SUPABASE_DB') }}"
      schema: analytics
      threads: 1
      keepalives_idle: 0
      connect_timeout: 60
      sslmode: require
