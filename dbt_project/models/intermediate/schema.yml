version: 2

models:
  - name: int_health__indicators_with_population
    description: >
      Core linkage model — joins CIHI ACSC indicators with StatsCan
      population estimates on province code + year. Includes both
      provincial and national rows. Adds suppression flag and
      cross-check rate from raw numerator.
    columns:
      - name: prov_code
        tests:
          - not_null
      - name: fiscal_year
        tests:
          - not_null
      - name: ci_lower
        description: >
          Lower bound of 95% CI for the age-standardized rate.
          Passed through from CIHI source data. Calculated by CIHI
          using the Tiwari modified gamma method for age-standardized rates.
      - name: ci_upper
        description: >
          Upper bound of 95% CI for the age-standardized rate.
          Passed through from CIHI source data.
      - name: is_suppressed
        description: >
          Unified suppression flag. True if CIHI suppressed the rate
          at source OR if numerator < 5 (small-cell suppression rule).
          Territories with small populations are most affected.
      - name: population_linked
        description: "Whether StatsCan population was successfully joined"

  - name: int_health__year_over_year
    description: >
      ACSC year-over-year analysis with change calculations, 5-year central
      moving average (matching Yukon Health Status Report methodology),
      CI-based gap-to-national, and provincial rankings.
    columns:
      - name: prov_code
        tests:
          - not_null
      - name: fiscal_year
        tests:
          - not_null
      - name: age_standardized_rate
        tests:
          - not_null
      - name: rolling_avg_5yr_central
        description: >
          5-year central moving average of the age-standardized rate.
          Window: 2 years preceding, current year, 2 years following.
          Matches the methodology used in Yukon Health Status Reports (2022–2024).
      - name: national_ci_lower
        description: >
          Lower bound of 95% CI for the national age-standardized rate.
          Used to determine statistical significance of gap-to-national.
      - name: national_ci_upper
        description: >
          Upper bound of 95% CI for the national age-standardized rate.
      - name: is_suppressed
        description: "Unified suppression flag passed through from indicators model"

  - name: int_mental_health__enriched
    description: >
      Mental health readmissions enriched with population, year-over-year
      changes, national gap with CI bounds, 5-year central moving average,
      and provincial rankings. Risk-adjusted rate is a percentage.
    columns:
      - name: prov_code
        tests:
          - not_null
      - name: fiscal_year
        tests:
          - not_null
      - name: risk_adjusted_rate
        description: >
          Risk-adjusted 30-day readmission rate (%). Adjusted for
          patient case-mix by CIHI using logistic regression.
      - name: rolling_avg_5yr_central
        description: >
          5-year central moving average of the risk-adjusted rate.
          Window: 2 years preceding, current year, 2 years following.
      - name: national_ci_lower
        description: "Lower bound of 95% CI for the national readmission rate"
      - name: national_ci_upper
        description: "Upper bound of 95% CI for the national readmission rate"
      - name: is_suppressed
        description: >
          Unified suppression flag. True if rate is NULL at source
          or numerator < 5 (CIHI small-cell rule).
      - name: is_emergency_overlap_period
        description: >
          True for fiscal years >= 2022. Yukon declared a Substance Use Health
          Emergency on January 20, 2022. MH readmission rates in this period
          are partly influenced by substance use comorbidity and should be
          interpreted alongside opioid and stimulant harm indicators.
      - name: interpretation_note
        description: >
          Contextual note for dashboard display. Non-null for post-emergency
          years, flagging the MH-substance use comorbidity relationship.

  - name: int_diabetes__enriched
    description: >
      Diabetes incidence enriched with population, year-over-year changes,
      national gap with CI bounds, 5-year central moving average,
      and provincial rankings. Uses PHAC CCDSS calendar years.
    columns:
      - name: prov_code
        tests:
          - not_null
      - name: fiscal_year
        tests:
          - not_null
      - name: age_standardized_rate
        description: >
          Age-standardized diabetes incidence rate per 100,000.
          Standardized to the 2011 Canadian population by PHAC.
      - name: rolling_avg_5yr_central
        description: >
          5-year central moving average of the age-standardized rate.
          Window: 2 years preceding, current year, 2 years following.
      - name: national_ci_lower
        description: "Lower bound of 95% CI for the national diabetes rate"
      - name: national_ci_upper
        description: "Upper bound of 95% CI for the national diabetes rate"
      - name: is_suppressed
        description: >
          Unified suppression flag. True if rate is NULL at source
          or case_counts < 10 (PHAC cell suppression rule, stricter than CIHI).
      - name: apply_remote_access_caveat
        description: >
          True for Yukon (YT) rows. CCDSS rates in territories may underestimate
          true prevalence due to lower physician contact rates and fewer
          administrative records in remote communities. Source: Ng et al. (2010),
          CCDSS 20-year review (2019). Interpret Yukon diabetes rate as a floor
          estimate, not a confirmed lower burden.
      - name: remote_access_interpretation_note
        description: >
          Full interpretive caveat for Yukon rows. NULL for all other provinces.
          Surfaces in dashboard wherever Yukon diabetes rate is shown as
          "Below National" to prevent misleading positive interpretation.

  - name: int_substance__enriched
    description: >
      Substance use harms enriched with YoY changes, rolling averages,
      Yukon-vs-Canada ratio, emergency period flag, and provincial rankings.
      Partitioned by substance (Opioids/Stimulants) and harm type (Deaths/ED/Hosp).
      Uses 3-year trailing average (only ~9 years of data).
    columns:
      - name: prov_code
        tests:
          - not_null
      - name: ref_year
        tests:
          - not_null
      - name: substance
        tests:
          - not_null
      - name: harm_type
        tests:
          - not_null
      - name: crude_rate_per_100k
        description: >
          Crude rate of substance-related harms per 100,000 population.
          Pre-calculated by PHAC. Not age-standardized.
      - name: yukon_vs_canada_ratio
        description: >
          Ratio of provincial rate to national rate. Values > 1.0 indicate
          the province has a higher rate than the national average.
      - name: is_emergency_period
        description: >
          True for all years >= 2022. Yukon declared a Substance Use
          Health Emergency on January 20, 2022.
      - name: is_suppressed
        description: "True if PHAC suppressed the rate (typically deaths < 5)"

  - name: int_communicable__enriched
    description: >
      Communicable disease data enriched with outbreak detection, YoY changes,
      5-year central moving average, national benchmark comparison, and
      provincial ranking. Implements statistical outbreak signal (mean + 2×SD)
      used in public health surveillance systems.
    columns:
      - name: disease
        tests:
          - not_null
      - name: ref_year
        tests:
          - not_null
      - name: prov_code
        tests:
          - not_null
      - name: rate_per_100k
        description: "Crude rate per 100,000 population"
        tests:
          - not_null
      - name: is_outbreak_signal
        description: >
          True when rate exceeds 5-year central moving average plus 2 standard
          deviations. Implements statistical process control (SPC) approach used
          in communicable disease surveillance. Only calculated for national
          time series data (sufficient data points for reliable statistics).
      - name: outbreak_z_score
        description: >
          Number of standard deviations the current rate is above (positive)
          or below (negative) the 5-year central moving average. Values > 2.0
          trigger the outbreak signal. Higher values indicate more extreme departures.
      - name: is_suppressed
        description: "True if case count < 5 (PHAC cell suppression rule)"
