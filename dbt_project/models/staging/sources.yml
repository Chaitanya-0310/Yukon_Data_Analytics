version: 2

sources:
  - name: raw
    description: "Raw data loaded from CIHI, PHAC, and Statistics Canada"
    schema: raw
    tables:
      - name: cihi_acsc
        description: >
          CIHI Your Health System — Ambulatory Care Sensitive Conditions (ACSC)
          hospitalizations by province/territory and fiscal year.
          Age-standardized rates per 100,000 population.
        columns:
          - name: province_territory
            description: "Province or territory name"
          - name: time_frame
            description: "Fiscal year range (e.g., 2022-2023)"
          - name: age_standardized_rate
            description: "ACSC hospitalization rate per 100,000, age-standardized"
          - name: reporting_level
            description: "Geographic reporting level (Health region, Province/territory, National)"

      - name: statscan_population
        description: >
          Statistics Canada Table 17-10-0005-01 — Population estimates
          on July 1st, by province/territory. Filtered to both sexes, all ages.
        columns:
          - name: ref_date
            description: "Reference date (year as YYYY-01-01)"
          - name: geo
            description: "Province or territory name"
          - name: value
            description: "Population count"

      - name: cihi_mental_health_readmissions
        description: >
          CIHI — 30-Day Readmission for Mental Health and Substance Use.
          Risk-adjusted rates by province/territory and fiscal year.
          Includes breakdowns by age group, sex, and urban/rural.
        columns:
          - name: province_territory
            description: "Province or territory name"
          - name: reporting_level
            description: "Geographic reporting level (Health region, Province/territory, National)"
          - name: time_frame
            description: "Fiscal year range (e.g., 2022-2023)"
          - name: risk_adjusted_rate
            description: "Risk-adjusted 30-day readmission rate (%)"
          - name: level_1_breakdown
            description: "Breakdown category (Not applicable, Age group, Sex, Urban/Rural)"

      - name: phac_ccdss_diabetes
        description: >
          PHAC Canadian Chronic Disease Surveillance System (CCDSS) —
          Diabetes mellitus (types combined) age-standardized incidence rate
          per 100,000 by province/territory and fiscal year.
        columns:
          - name: geography
            description: "Province, territory, or Canada"
          - name: fiscal_year
            description: "Fiscal year range (e.g., 20222023)"
          - name: rate_per_100000
            description: "Age-standardized diabetes incidence rate per 100,000"
          - name: sex
            description: "Both sexes, Males, Females"

      - name: phac_substance_harms
        description: >
          PHAC Health Infobase — Opioid- and Stimulant-related Harms in Canada.
          Crude rates per 100,000 for apparent toxicity deaths, ED visits,
          hospitalizations, and EMS responses by province/territory.
          Updated quarterly. Terminology follows PHAC/Yukon Coroner convention.
        columns:
          - name: substance
            description: "Opioids or Stimulants"
          - name: source
            description: "Harm type: Deaths, Hospitalizations, ED Visits, EMS"
          - name: specific_measure
            description: "Breakdown type (Overall numbers, Sex, Age group, etc.)"
          - name: region
            description: "Province/territory name or Canada"
          - name: pruid
            description: "Province/territory unique identifier"
          - name: time_period
            description: "By year or By quarter"
          - name: year_quarter
            description: "Year (e.g. 2022) or quarter (e.g. 2022 Q1)"
          - name: unit
            description: "Crude rate, Number, or Percent"
          - name: value
            description: "The metric value"

      - name: phac_cndss_national
        description: >
          PHAC Canadian Notifiable Disease Surveillance System (CNDSS) —
          National-level reported cases and crude rates per 100,000 for
          notifiable communicable diseases. Male/Female split, all ages.
          Diseases: Chlamydia, Giardiasis, Gonorrhea, Salmonellosis, Syphilis.
          Calendar years 1991–2023.
        columns:
          - name: year
            description: "Calendar year (integer)"
          - name: disease
            description: "Disease name (Chlamydia, Giardiasis, Gonorrhea, Salmonellosis, Syphilis)"
          - name: age_group
            description: "Age group (All)"
          - name: sex
            description: "Male or Female"
          - name: number_of_reported_cases
            description: "Count of reported cases for this disease/sex/year"
          - name: rate_per_100_000
            description: "Sex-specific crude rate per 100,000 population"

      - name: phac_cndss_provincial
        description: >
          PHAC CNDSS STI provincial/territorial data extracted from PHAC
          surveillance reports (2019, 2021, 2023). Covers Chlamydia, Gonorrhea,
          Infectious Syphilis with rates per 100,000 by province/territory.
          Source reports: PHAC STI Surveillance Data Updates.
        columns:
          - name: disease
            description: "Disease name (Chlamydia, Gonorrhea, Infectious Syphilis)"
          - name: year
            description: "Calendar year (integer)"
          - name: region
            description: "Province/territory full name or Canada"
          - name: prov_code
            description: "Standard 2-letter province/territory code (CA for national)"
          - name: cases
            description: "Number of reported cases (may be null for 2019 data)"
          - name: rate_per_100k
            description: "Crude rate per 100,000 population"
          - name: source_report
            description: "Source report identifier"
