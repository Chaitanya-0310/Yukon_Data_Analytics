version: 2

models:
  - name: mart_dashboard__yukon_overview
    description: >
      Yukon-specific KPIs for the overview dashboard page.
      Combines three indicators: ACSC hospitalizations, mental health
      readmissions, and diabetes incidence. Each row is a fiscal year
      with rates, CI-based national comparisons, and trends for all indicators.
      Note: CIHI indicators use fiscal years (Apr–Mar); PHAC CCDSS uses
      calendar years (Jan–Dec). Rows joining these indicators are approximate
      temporal comparisons, not exact co-period measurements.
    columns:
      - name: prov_code
        tests:
          - not_null
          - accepted_values:
              values: ['YT']
      - name: fiscal_year
        tests:
          - not_null
          - unique
      - name: acsc_rate
        description: "Age-standardized ACSC rate per 100,000"
      - name: acsc_national_rate
        description: "National average ACSC rate for the same year"
      - name: acsc_trend_direction
        description: "Increasing, Decreasing, or Stable vs prior year"
        tests:
          - accepted_values:
              values: ['Increasing', 'Decreasing', 'Stable']
      - name: acsc_national_comparison
        description: >
          Statistical comparison to national rate using 95% CI bounds.
          'Significantly Above/Below National' means the provincial rate
          falls outside the national confidence interval.
      - name: acsc_rolling_avg_5yr
        description: "5-year central moving average of ACSC rate (matches Yukon HSR methodology)"
      - name: acsc_is_suppressed
        description: "True if ACSC rate is suppressed due to small cell size"
      - name: mh_readmission_rate
        description: "Risk-adjusted 30-day mental health readmission rate (%)"
      - name: mh_national_comparison
        description: "CI-based statistical comparison to national MH readmission rate"
      - name: mh_rolling_avg_5yr
        description: "5-year central moving average of MH readmission rate"
      - name: mh_is_suppressed
        description: "True if MH rate is suppressed due to small cell size"
      - name: diabetes_incidence_rate
        description: "Age-standardized diabetes incidence rate per 100,000"
      - name: diabetes_national_comparison
        description: "CI-based statistical comparison to national diabetes rate"
      - name: diabetes_rolling_avg_5yr
        description: "5-year central moving average of diabetes incidence rate"
      - name: diabetes_is_suppressed
        description: "True if diabetes rate is suppressed due to small cell size"
      - name: cross_year_type_join_flag
        description: >
          Always true. Indicates that this mart joins fiscal-year (CIHI)
          and calendar-year (PHAC) data. Interpret cross-indicator
          comparisons within the same row as approximate temporal alignment.

  - name: mart_dashboard__provincial_comparison
    description: >
      All provinces/territories for the comparison dashboard page.
      Unions three indicators with region grouping, CI-based national
      comparison, rankings, and Yukon highlight flags. Use indicator_name
      to filter. Includes year_type to flag fiscal vs calendar year data.
    columns:
      - name: prov_code
        tests:
          - not_null
      - name: fiscal_year
        tests:
          - not_null
      - name: indicator_name
        description: "ACSC Hospitalizations, Mental Health Readmissions, or Diabetes Incidence"
        tests:
          - not_null
          - accepted_values:
              values: ['ACSC Hospitalizations', 'Mental Health Readmissions', 'Diabetes Incidence']
      - name: year_type
        description: "'fiscal' for CIHI indicators, 'calendar' for PHAC CCDSS"
      - name: national_comparison
        description: >
          CI-based statistical comparison to national rate.
          Uses national 95% CI bounds to determine significance.
      - name: rolling_avg_5yr_central
        description: "5-year central moving average (matches Yukon HSR methodology)"
      - name: is_suppressed
        description: "Unified suppression flag — true if rate should not be displayed"

  - name: mart_dashboard__trend_analysis
    description: >
      Time series for Yukon, territories, and national benchmark
      across all three indicators. Optimized for trend charts.
      Includes CI bounds for error band visualization.
    columns:
      - name: prov_code
        tests:
          - not_null
      - name: fiscal_year
        tests:
          - not_null
      - name: rate_value
        tests:
          - not_null
      - name: indicator_name
        tests:
          - not_null
      - name: ci_lower
        description: >
          Lower bound of 95% confidence interval. Methodology varies by source:
          CIHI uses Tiwari modified gamma method for age-standardized rates and
          Wilson score for proportions. PHAC uses Tiwari modified gamma.
          Suppressed (NULL) when source applies cell suppression rules.
      - name: ci_upper
        description: >
          Upper bound of 95% confidence interval. See ci_lower for methodology.
      - name: year_type
        description: "'fiscal' for CIHI indicators, 'calendar' for PHAC CCDSS diabetes"
      - name: is_suppressed
        description: "Unified suppression flag — true if rate should be treated with caution"

  - name: mart_dashboard__substance_harms
    description: >
      Substance use harms dashboard table. All provinces with opioid and
      stimulant harm data (deaths, ED visits, hospitalizations).
      Includes Yukon-vs-Canada ratio, emergency period flags, severity
      classification, and summary statistics. Uses calendar years.
      Terminology follows PHAC/Yukon Coroner convention: "apparent
      toxicity death" rather than "overdose".
    columns:
      - name: prov_code
        tests:
          - not_null
      - name: ref_year
        tests:
          - not_null
      - name: substance
        tests:
          - not_null
          - accepted_values:
              values: ['Opioids', 'Stimulants']
      - name: harm_type_label
        description: "Human-readable harm type: Apparent Toxicity Deaths, ED Visits, Hospitalizations, EMS Responses"
        tests:
          - not_null
      - name: indicator_label
        description: "Combined label e.g. 'Opioids — Apparent Toxicity Deaths'"
        tests:
          - not_null
      - name: crude_rate_per_100k
        description: "Crude rate per 100,000 population, pre-calculated by PHAC"
        tests:
          - not_null
      - name: severity_vs_national
        description: >
          Severity classification based on Yukon-to-Canada ratio:
          Crisis Level (>=2.0x), Severely Elevated (>=1.5x),
          Above National (>=1.0x), Below National (<1.0x).
      - name: is_emergency_period
        description: "True for years >= 2022 (post Yukon substance use health emergency declaration)"
      - name: emergency_period_label
        description: "'Baseline' (pre-2019), 'Pre-Emergency' (2019-2021), 'Post-Emergency' (2022+)"
      - name: is_suppressed
        description: "True if PHAC suppressed the rate"
